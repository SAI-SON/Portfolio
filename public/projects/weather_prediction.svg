<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 400" width="600" height="400">
  <!-- Sky gradient background -->
  <defs>
    <linearGradient id="skyGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#0f0c29;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#302b63;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#24243e;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="sunGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f7971e;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#ffd200;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="cloudGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#e0eafc;stop-opacity:0.95" />
      <stop offset="100%" style="stop-color:#cfdef3;stop-opacity:0.85" />
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="6" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="softglow">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="600" height="400" fill="url(#skyGrad)" />

  <!-- Stars -->
  <circle cx="50" cy="30" r="1.5" fill="white" opacity="0.8"/>
  <circle cx="120" cy="55" r="1" fill="white" opacity="0.6"/>
  <circle cx="200" cy="20" r="2" fill="white" opacity="0.9"/>
  <circle cx="300" cy="45" r="1.5" fill="white" opacity="0.7"/>
  <circle cx="420" cy="25" r="1" fill="white" opacity="0.5"/>
  <circle cx="510" cy="50" r="2" fill="white" opacity="0.8"/>
  <circle cx="560" cy="15" r="1" fill="white" opacity="0.6"/>
  <circle cx="80" cy="70" r="1" fill="white" opacity="0.4"/>
  <circle cx="450" cy="70" r="1.5" fill="white" opacity="0.7"/>
  <circle cx="350" cy="15" r="1" fill="white" opacity="0.5"/>

  <!-- Sun / Moon glow -->
  <circle cx="480" cy="90" r="45" fill="#ffd200" opacity="0.08" filter="url(#glow)"/>
  <circle cx="480" cy="90" r="30" fill="url(#sunGrad)" opacity="0.9" filter="url(#softglow)"/>
  <!-- Sun rays -->
  <g stroke="#ffd200" stroke-width="2" opacity="0.6" transform="translate(480,90)">
    <line x1="0" y1="-42" x2="0" y2="-52"/>
    <line x1="0" y1="42" x2="0" y2="52"/>
    <line x1="-42" y1="0" x2="-52" y2="0"/>
    <line x1="42" y1="0" x2="52" y2="0"/>
    <line x1="-30" y1="-30" x2="-37" y2="-37"/>
    <line x1="30" y1="-30" x2="37" y2="-37"/>
    <line x1="-30" y1="30" x2="-37" y2="37"/>
    <line x1="30" y1="30" x2="37" y2="37"/>
  </g>

  <!-- Main cloud -->
  <ellipse cx="200" cy="170" rx="90" ry="45" fill="url(#cloudGrad)" opacity="0.95"/>
  <circle cx="140" cy="165" r="38" fill="url(#cloudGrad)" opacity="0.9"/>
  <circle cx="195" cy="150" r="48" fill="url(#cloudGrad)" opacity="0.95"/>
  <circle cx="255" cy="162" r="36" fill="url(#cloudGrad)" opacity="0.9"/>

  <!-- Rain drops from cloud -->
  <g fill="#7ec8e3" opacity="0.85">
    <ellipse cx="145" cy="230" rx="3" ry="8"/>
    <ellipse cx="165" cy="245" rx="3" ry="8"/>
    <ellipse cx="185" cy="232" rx="3" ry="8"/>
    <ellipse cx="205" cy="248" rx="3" ry="8"/>
    <ellipse cx="225" cy="235" rx="3" ry="8"/>
    <ellipse cx="245" cy="250" rx="3" ry="8"/>
    <ellipse cx="155" cy="262" rx="3" ry="8"/>
    <ellipse cx="175" cy="270" rx="3" ry="8"/>
    <ellipse cx="215" cy="265" rx="3" ry="8"/>
    <ellipse cx="235" cy="272" rx="3" ry="8"/>
  </g>

  <!-- Small accent cloud -->
  <ellipse cx="80" cy="120" rx="45" ry="22" fill="white" opacity="0.15"/>
  <circle cx="55" cy="115" r="19" fill="white" opacity="0.12"/>
  <circle cx="85" cy="108" r="24" fill="white" opacity="0.15"/>
  <circle cx="110" cy="116" r="18" fill="white" opacity="0.12"/>

  <!-- Weather card UI mockup -->
  <rect x="30" y="290" width="540" height="90" rx="16" fill="white" opacity="0.08" stroke="white" stroke-width="0.5" stroke-opacity="0.2"/>

  <!-- Temperature -->
  <text x="70" y="330" font-family="Arial, sans-serif" font-size="36" font-weight="bold" fill="white" opacity="0.95">24°C</text>
  <text x="70" y="358" font-family="Arial, sans-serif" font-size="13" fill="#b0c4de" opacity="0.85">Partly Cloudy</text>

  <!-- Divider -->
  <line x1="190" y1="305" x2="190" y2="365" stroke="white" stroke-width="0.5" opacity="0.25"/>

  <!-- Forecast pills -->
  <g font-family="Arial, sans-serif" fill="white" opacity="0.85" font-size="12" text-anchor="middle">
    <text x="240" y="318">Mon</text>
    <text x="240" y="340" font-size="16">🌤</text>
    <text x="240" y="360">22°</text>

    <text x="310" y="318">Tue</text>
    <text x="310" y="340" font-size="16">🌧</text>
    <text x="310" y="360">18°</text>

    <text x="380" y="318">Wed</text>
    <text x="380" y="340" font-size="16">⛈</text>
    <text x="380" y="360">15°</text>

    <text x="450" y="318">Thu</text>
    <text x="450" y="340" font-size="16">☀️</text>
    <text x="450" y="360">27°</text>

    <text x="520" y="318">Fri</text>
    <text x="520" y="340" font-size="16">🌤</text>
    <text x="520" y="360">25°</text>
  </g>

  <!-- Title label -->
  <rect x="30" y="255" width="200" height="28" rx="8" fill="#4f46e5" opacity="0.75"/>
  <text x="130" y="274" font-family="Arial, sans-serif" font-size="13" fill="white" text-anchor="middle" font-weight="600">Weather Prediction</text>
</svg>
